<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>British Hills Explore - Activity Hub</title>
    
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Symbols/Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-[#fdfbf7] text-stone-800 min-h-screen flex flex-col p-4 md:p-8">

    <div class="max-w-5xl mx-auto w-full flex-1 flex flex-col">
        
        <!-- Header -->
        <div class="text-center mb-12 border-b-4 border-[#8b0000] pb-8 pt-4">
            <h1 class="text-4xl md:text-6xl font-bold uppercase tracking-widest text-[#8b0000] mb-2">British Hills</h1>
            <h2 class="text-2xl md:text-3xl font-light tracking-[0.2em] text-stone-600 uppercase">Activity Hub</h2>
        </div>

        <!-- Activity Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8 flex-1 content-start">
            
            <!-- Crossword -->
            <a href="crossword.html" class="group block bg-white border-4 border-stone-800 p-8 text-center shadow-[6px_6px_0px_rgba(44,30,22,1)] hover:-translate-y-1 hover:translate-x-[-1px] hover:shadow-[8px_8px_0px_rgba(139,0,0,1)] transition-all duration-200">
                <div class="text-[#8b0000] mb-4 transform group-hover:scale-110 transition-transform duration-200">
                    <i class="fa-solid fa-table-cells text-6xl"></i>
                </div>
                <h3 class="text-2xl font-bold uppercase tracking-wider mb-2">Crossword<br><span class="text-lg normal-case tracking-normal">(Pre-Intermediate)</span></h3>
            </a>

            <!-- Word Search -->
            <a href="wordsearch.html" class="group block bg-white border-4 border-stone-800 p-8 text-center shadow-[6px_6px_0px_rgba(44,30,22,1)] hover:-translate-y-1 hover:translate-x-[-1px] hover:shadow-[8px_8px_0px_rgba(139,0,0,1)] transition-all duration-200">
                <div class="text-[#8b0000] mb-4 transform group-hover:scale-110 transition-transform duration-200">
                    <i class="fa-solid fa-magnifying-glass text-6xl"></i>
                </div>
                <h3 class="text-2xl font-bold uppercase tracking-wider mb-2">Word Search<br><span class="text-lg normal-case tracking-normal">(Beginner)</span></h3>
            </a>

            <!-- BH Heroes (Beginner) -->
            <a href="BHheroesBeg.html" class="group block bg-white border-4 border-stone-800 p-8 text-center shadow-[6px_6px_0px_rgba(44,30,22,1)] hover:-translate-y-1 hover:translate-x-[-1px] hover:shadow-[8px_8px_0px_rgba(139,0,0,1)] transition-all duration-200">
                <div class="text-[#8b0000] mb-4 transform group-hover:scale-110 transition-transform duration-200">
                    <i class="fa-solid fa-user-check text-6xl"></i>
                </div>
                <h3 class="text-2xl font-bold uppercase tracking-wider mb-2">BH Heroes<br><span class="text-lg normal-case tracking-normal">(Beginner)</span></h3>
            </a>

            <!-- BH Heroes (Pre-Intermediate) -->
            <a href="BHheroes.html" class="group block bg-white border-4 border-stone-800 p-8 text-center shadow-[6px_6px_0px_rgba(44,30,22,1)] hover:-translate-y-1 hover:translate-x-[-1px] hover:shadow-[8px_8px_0px_rgba(139,0,0,1)] transition-all duration-200">
                <div class="text-[#8b0000] mb-4 transform group-hover:scale-110 transition-transform duration-200">
                    <i class="fa-solid fa-users-viewfinder text-6xl"></i>
                </div>
                <h3 class="text-2xl font-bold uppercase tracking-wider mb-2">BH Heroes<br><span class="text-lg normal-case tracking-normal">(Pre-Intermediate)</span></h3>
            </a>

            <!-- Scavenger Hunt -->
            <a href="treasurehunt.html" class="group block bg-white border-4 border-stone-800 p-8 text-center shadow-[6px_6px_0px_rgba(44,30,22,1)] hover:-translate-y-1 hover:translate-x-[-1px] hover:shadow-[8px_8px_0px_rgba(139,0,0,1)] transition-all duration-200">
                <div class="text-[#8b0000] mb-4 transform group-hover:scale-110 transition-transform duration-200">
                    <i class="fa-solid fa-map-location-dot text-6xl"></i>
                </div>
                <h3 class="text-2xl font-bold uppercase tracking-wider mb-2">Scavenger Hunt</h3>
            </a>

            <!-- Treasure Hunt (Pre-Intermediate) -->
            <a href="treasurehuntpre.html" class="group block bg-white border-4 border-stone-800 p-8 text-center shadow-[6px_6px_0px_rgba(44,30,22,1)] hover:-translate-y-1 hover:translate-x-[-1px] hover:shadow-[8px_8px_0px_rgba(139,0,0,1)] transition-all duration-200">
                <div class="text-[#8b0000] mb-4 transform group-hover:scale-110 transition-transform duration-200">
                    <i class="fa-solid fa-compass text-6xl"></i>
                </div>
                <h3 class="text-2xl font-bold uppercase tracking-wider mb-2">Treasure Hunt<br><span class="text-lg normal-case tracking-normal">(Pre-Intermediate)</span></h3>
            </a>

        </div>
    </div>

</body>
</html>
